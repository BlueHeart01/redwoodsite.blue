<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>𝑷𝑶𝑪𝑶 𝑿𝟓 𝑷𝑹𝑶 𝑹𝑶𝑴𝑺</title>
    <meta name="description" content="The ultimate destination for POCO X5 Pro custom ROMs">
    <meta name="theme-color" content="#0a0a1a">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #00f5ff;
            --secondary: #a855f7;
            --accent: #f472b6;
            --dark: #0a0a1a;
            --darker: #05050f;
            --card: rgba(20, 20, 40, 0.7);
            --text: #e0e0ff;
            --muted: #8888aa;
        }

        body {
            font-family: 'Outfit', 'Space Grotesk', sans-serif;
            background: var(--dark);
            color: var(--text);
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* Animated 3D Background */
        .bg-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            overflow: hidden;
        }

        .bg-canvas canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
        }

        .bg-gradient {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 245, 255, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(244, 114, 182, 0.1) 0%, transparent 60%);
            animation: gradientPulse 8s ease-in-out infinite;
            z-index: -1;
        }

        @keyframes gradientPulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.1); }
        }

        /* Floating particles */
        .particles {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 4px; height: 4px;
            background: var(--primary);
            border-radius: 50%;
            animation: float 15s infinite;
            opacity: 0.6;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.6; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        /* Header */
        header {
            position: fixed;
            top: 0; left: 0; right: 0;
            padding: 16px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            background: rgba(10, 10, 26, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 245, 255, 0.1);
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 2px;
        }

        .nav-buttons {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .nav-btn {
            padding: 10px 20px;
            border-radius: 12px;
            border: 1px solid rgba(0, 245, 255, 0.3);
            background: rgba(0, 245, 255, 0.1);
            color: var(--primary);
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .nav-btn:hover {
            background: rgba(0, 245, 255, 0.2);
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
        }

        .theme-toggle {
            width: 44px; height: 44px;
            border-radius: 12px;
            border: 1px solid rgba(168, 85, 247, 0.3);
            background: rgba(168, 85, 247, 0.1);
            color: var(--secondary);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
            box-shadow: 0 10px 30px rgba(168, 85, 247, 0.4);
        }

        /* Hero Section */
        .hero {
            padding: 140px 40px 60px;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: 56px;
            font-weight: 700;
            margin-bottom: 16px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 50%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 20px rgba(0, 245, 255, 0.5)); }
            50% { filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.5)); }
        }

        .hero p {
            font-size: 18px;
            color: var(--muted);
            max-width: 600px;
            margin: 0 auto 30px;
            line-height: 1.6;
        }

        .hero-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 40px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-number {
            font-size: 36px;
            font-weight: 700;
            color: var(--primary);
            display: block;
        }

        .stat-label {
            font-size: 14px;
            color: var(--muted);
        }

        /* 3D Cards Container */
        .rom-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 24px;
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 40px 60px;
        }

        /* 3D Tilt Card */
        .rom-card {
            background: var(--card);
            backdrop-filter: blur(30px);
            border-radius: 24px;
            padding: 28px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.4s, box-shadow 0.4s;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            perspective: 1000px;
        }

        .rom-card::before {
            content: '';
            position: absolute;
            inset: -2px;
            border-radius: 26px;
            background: linear-gradient(135deg, var(--primary), var(--secondary), var(--accent));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .rom-card:hover::before {
            opacity: 1;
        }

        .rom-card:hover {
            transform: translateY(-10px) rotateX(5deg) rotateY(-5deg);
            box-shadow: 
                0 30px 60px rgba(0, 245, 255, 0.2),
                0 0 100px rgba(168, 85, 247, 0.1);
        }

        .rom-card-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 16px;
        }

        .rom-icon {
            width: 56px; height: 56px;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: 700;
            color: #fff;
            transform: translateZ(30px);
        }

        .rom-info h3 {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .rom-status {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-official {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(0, 245, 255, 0.1));
            color: var(--primary);
            border: 1px solid rgba(0, 245, 255, 0.3);
        }

        .status-unofficial {
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.2), rgba(168, 85, 247, 0.1));
            color: var(--secondary);
            border: 1px solid rgba(168, 85, 247, 0.3);
        }

        .rom-desc {
            color: var(--muted);
            font-size: 14px;
            line-height: 1.6;
            margin: 16px 0;
            transform: translateZ(20px);
        }

        .rom-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            transform: translateZ(10px);
        }

        .rom-dev {
            font-size: 12px;
            color: var(--muted);
        }

        .rom-dev span {
            color: var(--text);
            font-weight: 500;
        }

        .rom-downloads {
            font-size: 12px;
            color: var(--muted);
        }

        /* Filters */
        .filters {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px 40px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 12px 24px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: var(--card);
            color: var(--muted);
            font-family: inherit;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .filter-btn:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .filter-btn.active {
            background: linear-gradient(135deg, rgba(0, 245, 255, 0.2), rgba(168, 85, 247, 0.2));
            border-color: var(--primary);
            color: var(--primary);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--card);
            border: 1px solid rgba(0, 245, 255, 0.2);
            border-radius: 24px;
            padding: 36px;
            width: 100%;
            max-width: 700px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.4s ease;
        }

        @keyframes modalIn {
            from { transform: scale(0.9) translateY(20px); opacity: 0; }
            to { transform: scale(1) translateY(0); opacity: 1; }
        }

        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            width: 40px; height: 40px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: var(--muted);
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text);
            transform: rotate(90deg);
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            padding: 14px 28px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid var(--primary);
            color: var(--text);
            font-size: 14px;
            z-index: 3000;
            opacity: 0;
            transition: all 0.4s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast.error { border-color: #f472b6; }
        .toast.success { border-color: #22c55e; }

        /* Responsive */
        @media (max-width: 1024px) {
            .rom-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 640px) {
            .rom-grid { grid-template-columns: 1fr; }
            .hero h1 { font-size: 36px; }
            header { padding: 16px 20px; }
            .rom-grid { padding: 20px; }
            .hero-stats { gap: 20px; }
        }

        /* Light mode */
        .light-mode {
            --dark: #f0f0f5;
            --darker: #e8e8f0;
            --card: rgba(255, 255, 255, 0.8);
            --text: #1a1a2e;
            --muted: #666680;
        }

        .light-mode .bg-gradient {
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 245, 255, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(168, 85, 247, 0.1) 0%, transparent 50%);
        }

        .light-mode header {
            background: rgba(240, 240, 245, 0.9);
        }

        .light-mode .rom-card {
            background: rgba(255, 255, 255, 0.9);
            border-color: rgba(0, 0, 0, 0.08);
        }

        .light-mode .modal {
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="bg-canvas">
        <canvas id="bgCanvas"></canvas>
    </div>
    <div class="bg-gradient"></div>
    <div class="particles" id="particles"></div>

    <header>
        <div class="logo">BLUE<span style="color:var(--primary)">REDWOOD</span></div>
        <div class="nav-buttons">
            <button class="nav-btn" onclick="openUpload()">+ Upload ROM</button>
            <button class="nav-btn" onclick="openAbout()">About</button>
            <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <section class="hero">
        <h1>𝑷𝑶𝑪𝑶 𝑿𝟓 𝑷𝑹𝑶 𝑹𝑶𝑴𝑺</h1>
        <p>Discover the best custom ROMs for your POCO X5 Pro. Smooth, fast, and packed with features.</p>
        <div class="hero-stats">
            <div class="stat-item">
                <span class="stat-number" id="totalROMs">0</span>
                <span class="stat-label">ROMs Available</span>
            </div>
            <div class="stat-item">
                <span class="stat-number" id="totalDownloads">0</span>
                <span class="stat-label">Total Downloads</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">24/7</span>
                <span class="stat-label">Updates</span>
            </div>
        </div>
    </section>

    <div class="filters">
        <button class="filter-btn active" onclick="filterROMs('all')">All ROMs</button>
        <button class="filter-btn" onclick="filterROMs('official')">Official</button>
        <button class="filter-btn" onclick="filterROMs('unofficial')">Unofficial</button>
    </div>

    <div class="rom-grid" id="romGrid"></div>

    <!-- Detail Modal -->
    <div class="modal-overlay" id="detailModal">
        <div class="modal">
            <button class="modal-close" onclick="closeDetail()">×</button>
            <div id="detailContent"></div>
        </div>
    </div>

    <!-- Upload Modal -->
    <div class="modal-overlay" id="uploadModal">
        <div class="modal">
            <button class="modal-close" onclick="closeUpload()">×</button>
            <h2 style="margin-bottom:8px">Upload ROM</h2>
            <p style="color:var(--muted);margin-bottom:20px">Submit a new ROM for POCO X5 Pro</p>
            <div class="form-group">
                <input type="text" id="romName" placeholder="ROM Name" style="width:100%;padding:14px;background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text)">
            </div>
            <div class="form-group">
                <input type="text" id="romDev" placeholder="Developer Name" style="width:100%;padding:14px;background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text)">
            </div>
            <div class="form-group">
                <textarea id="romDesc" placeholder="Description" rows="3" style="width:100%;padding:14px;background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text);resize:none"></textarea>
            </div>
            <div class="form-group">
                <select id="romStatus" style="width:100%;padding:14px;background:var(--card);border:1px solid rgba(255,255,255,0.1);border-radius:12px;color:var(--text)">
                    <option value="official">Official</option>
                    <option value="unofficial">Unofficial</option>
                </select>
            </div>
            <button class="nav-btn" onclick="submitROM()" style="width:100%;margin-top:10px">Submit ROM</button>
        </div>
    </div>

    <!-- About Modal -->
    <div class="modal-overlay" id="aboutModal">
        <div class="modal">
            <button class="modal-close" onclick="closeAbout()">×</button>
            <div style="text-align:center;padding:20px">
                <div style="width:80px;height:80px;margin:0 auto 20px;background:linear-gradient(135deg,var(--primary),var(--secondary));border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:40px">∞</div>
                <h2>BlueREDWOOD</h2>
                <p style="color:var(--muted);margin:10px 0">Community-driven ROMs for POCO X5 Pro</p>
                <a href="https://t.me/bluehearts_Builds016" target="_blank" style="color:var(--primary);text-decoration:none">📢 Join Telegram</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // Default ROMs data
        const defaultROMs = [
            { name: "Infinity X", status: "official", dev: "BlueHeart016", desc: "Feature-packed ROM with endless customization options. Smooth, stable, and refined.", icon: "∞", downloads: 1240, versions: [{ver: "Android 16", date: "2026-05-10", rom: "https://sourceforge.net/projects/infinity-x/", boot: "#", vendor_boot: "#", dtbo: "#"}] },
            { name: "ASCP OS", status: "official", dev: "BlueHeart016", desc: "Advanced Stock Custom ROM with the best optimizations.", icon: "A", downloads: 2100, versions: [{ver: "Android 16", date: "2026-05-12", rom: "https://t.me/bluehearts_Builds016/25", boot: "#", vendor_boot: "#", dtbo: "#"}] },
            { name: "AxionOS", status: "official", dev: "BlueHeart016", desc: "AOSP-based ROM focused on performance and minimalism.", icon: "A", downloads: 980, versions: [{ver: "Android 16", date: "2026-05-05", rom: "#", boot: "#", vendor_boot: "#", dtbo: "#"}] },
            { name: "EvoX", status: "unofficial", dev: "EvoX Team", desc: "Feature-rich custom ROM with Pixel experience.", icon: "E", downloads: 750, versions: [{ver: "Android 15", date: "2026-04-20", rom: "#", boot: "#", vendor_boot: "#", dtbo: "#"}] },
            { name: "RisingOS", status: "unofficial", dev: "RisingTeam", desc: "Custom ROM with powerful features and optimization.", icon: "R", downloads: 620, versions: [{ver: "Android 15", date: "2026-04-15", rom: "#", boot: "#", vendor_boot: "#", dtbo: "#"}] },
            { name: "DerpFest", status: "unofficial", dev: "DerpFest", desc: "AOSP-based ROM with extra customization options.", icon: "D", downloads: 410, versions: [{ver: "Android 15", date: "2026-03-28", rom: "#", boot: "#", vendor_boot: "#", dtbo: "#"}] }
        ];

        // Load ROMs
        let roms = JSON.parse(localStorage.getItem('blueredwood_roms')) || defaultROMs;
        if (!localStorage.getItem('blueredwood_roms')) {
            localStorage.setItem('blueredwood_roms', JSON.stringify(defaultROMs));
        }

        // Render ROMs
        function renderROMs(filter = 'all') {
            const grid = document.getElementById('romGrid');
            let filtered = filter === 'all' ? roms : roms.filter(r => r.status === filter);
            
            grid.innerHTML = filtered.map((r, i) => `
                <div class="rom-card" onclick="showDetail(${roms.indexOf(r)})">
                    <div class="rom-card-header">
                        <div class="rom-icon">${r.icon || '📱'}</div>
                        <div class="rom-info">
                            <h3>${r.name}</h3>
                            <span class="rom-status status-${r.status}">${r.status}</span>
                        </div>
                    </div>
                    <p class="rom-desc">${r.desc || 'No description provided.'}</p>
                    <div class="rom-footer">
                        <span class="rom-dev">by <span>${r.dev || 'Unknown'}</span></span>
                        <span class="rom-downloads">⬇ ${r.downloads || 0}</span>
                    </div>
                </div>
            `).join('');

            // Update stats
            document.getElementById('totalROMs').textContent = roms.length;
            document.getElementById('totalDownloads').textContent = roms.reduce((a, b) => a + (b.downloads || 0), 0);
        }

        function filterROMs(type) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            renderROMs(type);
        }

        // Detail Modal
        function showDetail(index) {
            const r = roms[index];
            const versions = r.versions || [];
            document.getElementById('detailContent').innerHTML = `
                <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px">
                    <div class="rom-icon" style="width:70px;height:70px;font-size:32px">${r.icon || '📱'}</div>
                    <div>
                        <h2 style="margin:0">${r.name}</h2>
                        <span class="rom-status status-${r.status}" style="margin-top:8px;display:inline-block">${r.status}</span>
                        <p style="color:var(--muted);margin:8px 0 0">👤 ${r.dev || 'Unknown'}</p>
                    </div>
                </div>
                <p style="color:var(--muted);line-height:1.6;margin-bottom:20px">${r.desc || 'No description provided.'}</p>
                
                <div style="background:var(--card);border-radius:16px;padding:20px;margin:16px 0">
                    <h4 style="margin:0 0 16px;color:var(--primary)">📥 Downloads - ${versions[0]?.ver || 'N/A'}</h4>
                    ${versions.length && versions[0].rom !== '#' ? `
                        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px">
                            <div style="background:rgba(0,245,255,0.1);border-radius:12px;padding:16px;text-align:center">
                                <h5 style="margin:0 0 8px;color:var(--muted)">📱 ROM</h5>
                                <a href="${versions[0].rom}" target="_blank" style="color:var(--primary);text-decoration:none">⬇ Download</a>
                            </div>
                            <div style="background:rgba(168,85,247,0.1);border-radius:12px;padding:16px;text-align:center">
                                <h5 style="margin:0 0 8px;color:var(--muted)">📦 boot.img</h5>
                                <span style="color:var(--muted);font-size:12px">Coming soon</span>
                            </div>
                        </div>
                        <a href="${versions[0].rom}" target="_blank" class="nav-btn" style="display:block;text-align:center;margin-top:16px;padding:16px">📥 Download ${r.name} Now</a>
                    ` : '<p style="color:var(--muted);text-align:center">No downloads available</p>'}
                </div>
                
                <div style="text-align:center;padding-top:16px;border-top:1px solid rgba(255,255,255,0.05)">
                    <span style="color:var(--muted)">⬇️ ${r.downloads || 0} total downloads</span>
                </div>
            `;
            document.getElementById('detailModal').classList.add('active');
        }

        function closeDetail() {
            document.getElementById('detailModal').classList.remove('active');
        }

        // Upload Modal
        function openUpload() { document.getElementById('uploadModal').classList.add('active'); }
        function closeUpload() { document.getElementById('uploadModal').classList.remove('active'); }

        function submitROM() {
            const name = document.getElementById('romName').value.trim();
            const dev = document.getElementById('romDev').value.trim();
            const desc = document.getElementById('romDesc').value.trim();
            const status = document.getElementById('romStatus').value;

            if (!name) { showToast('ROM name required!', 'error'); return; }

            roms.unshift({ name, dev, desc, status, icon: '📱', downloads: 0, versions: [{ver: "Custom", date: new Date().toISOString().split('T')[0], rom: "#", boot: "#", vendor_boot: "#", dtbo: "#"}] });
            localStorage.setItem('blueredwood_roms', JSON.stringify(roms));
            renderROMs();
            closeUpload();
            showToast('ROM uploaded successfully!', 'success');
        }

        // About Modal
        function openAbout() { document.getElementById('aboutModal').classList.add('active'); }
        function closeAbout() { document.getElementById('aboutModal').classList.remove('active'); }

        // Theme Toggle
        function toggleTheme() {
            const isLight = document.body.classList.toggle('light-mode');
            document.querySelector('.theme-toggle').textContent = isLight ? '☀️' : '🌙';
            localStorage.setItem('blueredwood_theme', isLight ? 'light' : 'dark');
        }

        if (localStorage.getItem('blueredwood_theme') === 'light') {
            document.body.classList.add('light-mode');
            document.querySelector('.theme-toggle').textContent = '☀️';
        }

        // Toast
        function showToast(msg, type = '') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast show ' + type;
            setTimeout(() => t.classList.remove('show'), 4000);
        }

        // Animated Background Canvas
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles3D = [];
        for (let i = 0; i < 80; i++) {
            particles3D.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                z: Math.random() * 1000,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 3 + 1
            });
        }

        function animate3DBackground() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles3D.forEach(p => {
                p.z -= 2;
                if (p.z <= 0) p.z = 1000;
                
                const scale = 500 / p.z;
                const x2d = (p.x - canvas.width / 2) * scale + canvas.width / 2;
                const y2d = (p.y - canvas.height / 2) * scale + canvas.height / 2;
                
                const alpha = 1 - p.z / 1000;
                ctx.beginPath();
                ctx.arc(x2d, y2d, p.size * scale, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 245, 255, ${alpha * 0.6})`;
                ctx.fill();
            });
            requestAnimationFrame(animate3DBackground);
        }

        // Floating particles
        for (let i = 0; i < 20; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.animationDelay = Math.random() * 15 + 's';
            p.style.animationDuration = (15 + Math.random() * 10) + 's';
            document.getElementById('particles').appendChild(p);
        }

        // Initialize
        animate3DBackground();
        renderROMs();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
