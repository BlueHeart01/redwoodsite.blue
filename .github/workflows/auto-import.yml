name: Auto Import ROMs from Telegram

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  auto-import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Run auto-import script
        id: autoimport
        run: |
          python scripts/gh_auto_import.py 2>&1
        continue-on-error: true

      - name: Check for changes
        id: changes
        run: |
          git diff --quiet roms.json && echo "has_changes=false" >> "$GITHUB_OUTPUT" || echo "has_changes=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "opencode-bot"
          git config user.email "bot@redwoodsite.blue"
          git add roms.json .known_posts.json
          git commit -m "auto: update roms from t.me/pocox5proin"
          git push

      - name: Fail if import errored
        if: steps.autoimport.outcome == 'failure'
        run: exit 1
